<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 專案成效即時看板(存量表)</title>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 引入自訂 CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- 引入資料 -->
    <script src="data.js"></script>
</head>
<body>
    <!-- 動態背景元素 -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="dashboard-container">
        <!-- 頂部標題與時間 -->
        <header class="glass-panel header">
            <div class="title-group">
                <h1>⚡ 業務案件存量總覽</h1>
                <p class="subtitle">DATA DASHBOARD / 已准待撥</p>
            </div>
            <div class="status-group">
                <div class="update-time">
                    <span class="pulse-dot"></span>
                    <span id="lastUpdated">最後更新: 抓取中...</span>
                </div>
                <button id="refreshBtn" class="refresh-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M21 2v6h-6"></path>
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 22v-6h6"></path>
                    </svg>
                    Reload (F5)
                </button>
            </div>
        </header>

        <!-- 健康度指標橫幅 -->
        <section id="healthBanner" class="glass-panel health-banner">
            <div class="health-icon" id="healthIcon">⏳</div>
            <div class="health-content">
                <h2 id="healthTitle">系統分析中...</h2>
                <p id="healthDesc">正在計算近期對保產能變化趨勢</p>
            </div>
            <div class="health-stats">
                <div class="mini-stat">
                    <span class="label">待對保</span>
                    <span class="value" id="trendA">--</span>
                </div>
                <div class="mini-stat">
                    <span class="label">待撥款</span>
                    <span class="value" id="trendB">--</span>
                </div>
            </div>
        </section>

        <!-- 全局總和卡片區塊 -->
        <section class="summary-cards" id="globalSummary">
            <!-- 內容由 JS 動態生成 -->
        </section>

        <!-- 詳細數據表格 -->
        <section class="glass-panel table-section">
            <h2 class="section-title">👥 各業務經辦存量明細</h2>
            <div class="table-responsive">
                <table id="dataTable" class="modern-table">
                    <thead>
                        <tr>
                            <th>經辦人員</th>
                            <th>已進件待核准<br><small>(件數 / 金額)</small></th>
                            <th>已准待對保<br><small>(件數 / 金額)</small></th>
                            <th>已對保待撥<br><small>(件數 / 金額)</small></th>
                            <th class="highlight-col">已准待撥總計<br><small>(件數 / 金額)</small></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 資料由 JS 填入 -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
